<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="/admin/frontend/assets/adminLogin.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            
            <div class="login-header">
                <h2>Admin Portal</h2>
                <p>Sign in to manage the dashboard</p>
            </div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="admin@domain.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div id="loginError" class="error-message"></div>

                <button id="login-btn" type="submit" class="login-btn">Log In</button>
            </form>

        </div>
    </div>
  <script src="/admin/frontend/scripts/loginAdmin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — User Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/frontend/assets/admin.css" />
</head>
<body>

  <!-- Page Header -->
  <div class="page-header">
    <h1 class="page-title">Admin</h1>
  </div>

  <!-- App Shell -->
  <div class="shell">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        </div>
        <span class="sidebar__name">User Management</span>
      </div>
      <nav class="sidebar__nav">
        <a href="#" class="sidebar__link sidebar__link--active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/></svg>
          Users
        </a>
        <a href="#" class="sidebar__link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/><path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Posts
        </a>
        <a href="#" class="sidebar__link">
          
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 9h16M4 15h16M9 4L7 20M17 4l-2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Channels
        </a>
      </nav>
    </aside>

    <!-- Content -->
    <div class="content">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar__left">
          <div class="search-box">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="text" class="search-box__input" placeholder="Search users…" id="searchInput" />
          </div>
        </div>
        <div class="toolbar__right">
          <span class="user-count" id="userCount"></span>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table class="data-table" id="userTable">
          <thead>
            <tr>
              <th class="th-actions"></th>
              <th>Email</th>
              <th>Username</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody id="userBody">
            <!-- Rows injected by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="addUser">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
  </button>

  <!-- ── Modal: Add New User ── -->
  <div class="modal-backdrop" id="addModal">
    <div class="modal">
      <h2 class="modal__title">Add New User</h2>
      <div class="modal__body">
        <div class="field">
          <label class="field__label">Username <span class="req">*</span></label>
          <input class="field__input" type="text" id="addUsername" placeholder="longpham123" />
        </div>
        <div class="field">
          <label class="field__label">Email <span class="req">*</span></label>
          <input class="field__input" type="email" id="addEmail" placeholder="email@example.com" />
        </div>
        <div class="field">
          <label class="field__label">Password <span class="req">*</span></label>
          <div class="field__password-wrap">
            <input class="field__input" type="password" id="addPassword" placeholder="••••••••" />
            <button class="field__eye" type="button" data-target="addPassword">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label class="field__label">Repeat Password <span class="req">*</span></label>
          <div class="field__password-wrap">
            <input class="field__input" type="password" id="addPasswordRepeat" placeholder="••••••••" />
            <button class="field__eye" type="button" data-target="addPasswordRepeat">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>
        <p class="modal__error" id="addError"></p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="addCancel">Cancel</button>
        <button class="btn btn--primary" id="addCreate">Create</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Edit User ── -->
  <div class="modal-backdrop" id="editModal">
    <div class="modal">
      <h2 class="modal__title">Edit User</h2>
      <div class="modal__body">
        <div class="field">
          <label class="field__label">Username</label>
          <input class="field__input field__input--readonly" type="text" id="editUsername" readonly />
        </div>
        <div class="field">
          <label class="field__label">Email <span class="req">*</span></label>
          <input class="field__input" type="email" id="editEmail" placeholder="email@example.com" />
        </div>
        <p class="modal__error" id="editError"></p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="editCancel">Cancel</button>
        <button class="btn btn--primary" id="editUpdate">Update</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Confirm Delete ── -->
  <div class="modal-backdrop" id="deleteModal">
    <div class="modal modal--sm">
      <h2 class="modal__title">Delete User</h2>
      <div class="modal__body">
        <p class="modal__text">Are you sure you want to delete <strong id="deleteUserName"></strong>? This action cannot be undone.</p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="deleteCancel">Cancel</button>
        <button class="btn btn--danger" id="deleteConfirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="/admin/frontend/scripts/admin.js"></script>
</body>
</html>

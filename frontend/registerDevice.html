<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Register Device</title>

  <link rel="stylesheet" href="./assets/css/registerDevice.css" />
  <script src="./assets/scripts/registerCrypto.js" defer></script>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="icon">💻🔑</div>

      <h1>Register This Device</h1>

      <p class="subtitle">
        Link this browser to your account for cryptographic verification.
      </p>

      <div class="info-box">
        <p>
          This device will generate a private key and public key.
          The private key stays in this browser, while the public key is saved on the server.
        </p>
      </div>

      <button id="registerDeviceBtn">
        Register This Device
      </button>

      <p id="statusMessage" class="status">
        Click the button to register this device.
      </p>

      <a href="login.html" class="back-link">Back to Login</a>
    </div>
  </div>

</body>
</html>

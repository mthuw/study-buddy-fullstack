<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <link rel="stylesheet" href="./assets/css/otp.css">
    <script src="/frontend/assets/scripts/otp.js" defer></script>
</head>
<body>
    <div class="otp-container">
        <h2>Verify Your Account</h2>
        <p>We've sent a 6-digit code to your email.</p>
        
        <form class="otp-form" action="#">
            <div class="otp-inputs">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field" autofocus>
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
                <input type="text" maxlength="1" inputmode="numeric" class="otp-field">
            </div>
            
            <button type="submit" class="verify-btn">Verify OTP</button>
        </form>
        
        <div class="resend-text">
            <p>Didn't receive the code? <a href="#">Resend</a></p>
        </div>
    </div>
</body>
</html>
